# ===== PROD =====
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.batch.job.enabled=false

duckdb.path=${DUCKDB_PATH}

ai.server.base-url=${AI_SERVER_URL}

# OpenHTMLtoPDF requires a Korean font file that is available in the production image.
report.pdf.font-path=${REPORT_PDF_FONT_PATH}

# JWT
custom.jwt.secret-key=${JWT_SECRET_KEY}
custom.jwt.access-expire-seconds=${JWT_ACCESS_EXPIRE_SECONDS:1800}
custom.jwt.refresh-expire-seconds=${JWT_REFRESH_EXPIRE_SECONDS:604800}

# Redis
spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT}
